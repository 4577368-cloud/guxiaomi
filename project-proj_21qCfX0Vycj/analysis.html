<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票分析 - 股小蜜</title>
    <meta name="description" content="多智能体股票分析，多角色辩论与报告，RSS/GNews 相关新闻">
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer theme {
            :root {
                --primary-color: #1e40af;
                --secondary-color: #f3f4f6;
                --success-color: #059669;
                --danger-color: #dc2626;
                --warning-color: #d97706;
                --text-primary: #111827;
                --text-secondary: #6b7280;
                --border-color: #e5e7eb;
            }
        }
        @layer base {
            body {
              font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
              background-color: #f6f8ff;
              background-image:
                radial-gradient(1200px circle at 15% -10%, rgba(34, 211, 238, 0.14) 0%, rgba(34, 211, 238, 0.0) 45%),
                radial-gradient(900px circle at 85% 10%, rgba(99, 102, 241, 0.14) 0%, rgba(99, 102, 241, 0.0) 40%),
                radial-gradient(700px circle at 60% 100%, rgba(16, 185, 129, 0.08) 0%, rgba(16, 185, 129, 0.0) 45%);
            }
        }
        @layer components {
            .btn { @apply px-3 py-2 md:px-4 md:py-2.5 rounded-lg font-medium transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 text-sm md:text-base min-h-[2.75rem] items-center justify-center inline-flex; }
            .btn-primary {
              @apply text-white rounded-lg min-h-[2.75rem] px-5;
              background-image: linear-gradient(90deg, rgba(56,189,248,0.95) 0%, rgba(59,130,246,0.95) 50%, rgba(99,102,241,0.95) 100%);
              box-shadow:
                0 0 0 1px rgba(56,189,248,0.20),
                0 12px 40px rgba(59,130,246,0.20);
            }
            .btn-primary:hover { filter: brightness(1.03); }
            .btn-primary:focus { outline: none; box-shadow: 0 0 0 2px rgba(56,189,248,0.35), 0 12px 40px rgba(59,130,246,0.22); }
            .btn-xs { @apply min-h-8 px-2 py-1 text-xs rounded-md; }
            .btn-secondary { @apply bg-gray-200 text-gray-800 hover:bg-gray-300 focus:ring-gray-500; }
            .btn-success { @apply bg-[var(--success-color)] text-white hover:bg-green-700 focus:ring-green-500; }
            .card { @apply bg-white rounded-lg md:rounded-xl shadow-md border border-gray-300 p-3 md:p-6; }
            .glass-card {
              @apply rounded-xl md:rounded-2xl backdrop-blur-xl;
              background: rgba(255, 255, 255, 0.68);
              border: 1px solid rgba(255, 255, 255, 0.65);
              box-shadow:
                0 0 0 0.5px rgba(255,255,255,0.45),
                0 22px 70px rgba(2, 6, 23, 0.10);
            }
            .segmented-shell {
              @apply inline-flex rounded-xl p-1 border backdrop-blur-md;
              background: rgba(255,255,255,0.45);
              border-color: rgba(255,255,255,0.60);
            }
            .seg-btn {
              @apply px-3 py-2 text-sm md:text-base rounded-lg transition-all duration-200;
              background: transparent;
              border: 1px solid transparent;
              color: rgba(15, 23, 42, 0.85);
            }
            .seg-btn.on {
              background: linear-gradient(90deg, rgba(34, 211, 238, 0.95), rgba(59, 130, 246, 0.92));
              color: #ffffff;
              border-color: rgba(34, 211, 238, 0.35);
              box-shadow: 0 0 24px rgba(34, 211, 238, 0.20);
            }
            .input-field { @apply w-full min-h-[2.75rem] px-3.5 py-2 text-base border border-slate-200/90 rounded-lg bg-white/80 focus:ring-2 focus:ring-[var(--primary-color)] focus:border-blue-400/60; }
            .input-field-compact { @apply min-h-9 py-1.5 text-sm; }
            .report-markdown blockquote { @apply border-l-4 border-blue-300 pl-3 my-2 text-gray-600; }
            .report-markdown-block .report-markdown { @apply text-[15px] leading-relaxed; }
            .report-markdown-block .report-markdown h2 { @apply text-xl font-bold text-gray-900 mt-4 mb-2; }
            .report-markdown-block .report-markdown h3 { @apply text-lg font-semibold text-gray-800 mt-3 mb-1; }
            .report-markdown-block .report-markdown p { @apply my-1.5; }
            .report-markdown-block .report-markdown ul { @apply my-2 pl-6 space-y-0.5; }
        }
    </style>
    <link rel="icon" href="https://app.trickle.so/storage/app/46bdde6b-ce0a-436d-9861-f705820c2391.png">
</head>
<body>
    <div id="root"></div>
    <script src="env.js"></script>
    <script type="text/babel" src="analysis-app.js"></script>
    <script src="analysis-notify.js"></script>
</body>
</html>
