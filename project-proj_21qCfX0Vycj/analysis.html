    <style type="text/tailwindcss">
        :root {
            --primary-color: #38bdf8;
            --primary-hover: #7dd3fc;
            --success-color: #34d399;
            --danger-color: #f87171;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.12);
            --accent-news: #38bdf8;
            --accent-analysis: #5eead4;
            --page-bg-top: #1a2235;
            --page-bg-bottom: #243048;
            --page-bg-mid: #1e2a40;
        }
        @layer base {
            body {
              font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
              color: var(--text-primary);
              min-height: 100vh;
              -webkit-font-smoothing: antialiased;
              -moz-osx-font-smoothing: grayscale;
              background-color: var(--page-bg-top);
              background-image:
                radial-gradient(900px 500px at 12% -8%, rgba(56, 189, 248, 0.06), transparent 55%),
                radial-gradient(700px 400px at 88% 5%, rgba(94, 234, 212, 0.05), transparent 50%),
                radial-gradient(600px 350px at 50% 100%, rgba(251, 191, 36, 0.03), transparent 45%),
                linear-gradient(165deg, var(--page-bg-top) 0%, var(--page-bg-bottom) 55%, var(--page-bg-mid) 100%);
              background-attachment: fixed;
            }
        }
        @layer components {
            .font-display { font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif; }
            .gx-num { font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
            .btn { @apply inline-flex items-center justify-center h-10 md:h-11 min-h-0 px-4 md:px-5 py-0 rounded-xl font-medium text-sm md:text-base transition-all duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2; --tw-ring-offset-color: #1a2235; }
            .btn-sm, .btn-xs { @apply h-6 md:h-7 min-h-0 px-2 md:px-2.5 py-0 text-[11px] md:text-xs rounded-lg; }
            .btn-icon { @apply h-7 w-7 md:h-8 md:w-8 min-w-0 shrink-0 px-0 py-0 rounded-lg; }
            .nav-chip { height: 1.625rem; min-height: 0; padding-left: 0.45rem; padding-right: 0.45rem; border-radius: 0.5rem; font-size: 0.6875rem; gap: 0.25rem; }
            @media (min-width: 768px) { .nav-chip { height: 1.75rem; padding-left: 0.55rem; padding-right: 0.55rem; font-size: 0.75rem; } }
            .btn-icon-plain { @apply inline-flex items-center justify-center h-6 w-6 min-w-0 shrink-0 rounded-md border-0 bg-transparent p-0 text-slate-400 transition-colors; }
            .btn-icon-plain:hover:not(:disabled) { @apply bg-white/[0.08] text-slate-200; }
            .btn-primary {
              @apply text-slate-950 shadow-md shadow-sky-500/20 hover:bg-[var(--primary-hover)] focus-visible:ring-sky-400;
              background: var(--primary-color);
            }
            .btn-primary.btn-analyze-busy {
              box-shadow: 0 2px 10px rgba(56, 189, 248, 0.14);
            }
            .btn-secondary {
              @apply border border-white/15 text-slate-100 shadow-sm hover:bg-white/10 focus-visible:ring-sky-400/50;
              background: linear-gradient(165deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.04) 100%);
            }
            .btn-success { @apply bg-[var(--success-color)] text-slate-950 shadow-md shadow-emerald-600/20 hover:brightness-110 focus-visible:ring-emerald-400; }
            .btn-accent-news, .btn-accent-analysis, .btn-accent-paipan {
              @apply border border-white/15 text-slate-100 shadow-sm hover:border-sky-400/30 focus-visible:ring-sky-400/50;
              background: linear-gradient(165deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.04) 100%);
            }
            .card {
              @apply rounded-2xl border p-4 shadow-xl md:p-6;
              background: linear-gradient(168deg, rgba(255, 255, 255, 0.09) 0%, rgba(255, 255, 255, 0.04) 48%, rgba(26, 34, 53, 0.28) 100%);
              border-color: rgba(255, 255, 255, 0.1);
              color: var(--text-primary);
              backdrop-filter: blur(20px) saturate(140%);
            }
            .glass-card {
              @apply rounded-xl md:rounded-2xl backdrop-blur-xl;
              background: linear-gradient(168deg, rgba(255, 255, 255, 0.09) 0%, rgba(255, 255, 255, 0.04) 48%, rgba(26, 34, 53, 0.28) 100%);
              border: 1px solid rgba(255, 255, 255, 0.1);
              color: var(--text-primary);
              box-shadow: 0 22px 44px -14px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            }
            .segmented-shell {
              @apply inline-flex rounded-xl p-1 border backdrop-blur-md;
              background: rgba(255,255,255,0.06);
              border-color: rgba(255,255,255,0.12);
            }
            .seg-btn {
              @apply px-3 py-2 text-sm md:text-base rounded-lg transition-all duration-200;
              background: transparent;
              border: 1px solid transparent;
              color: rgba(226, 232, 240, 0.88);
            }
            .seg-btn.on {
              background: linear-gradient(90deg, rgba(56, 189, 248, 0.75), rgba(94, 234, 212, 0.7));
              color: #0f172a;
              border-color: rgba(56, 189, 248, 0.35);
              box-shadow: 0 0 24px rgba(56, 189, 248, 0.18);
            }
            .input-field {
              @apply w-full h-10 md:h-11 min-h-0 rounded-xl px-3 md:px-4 py-0 text-sm md:text-base backdrop-blur-md transition-all duration-200;
              background: rgba(26, 34, 53, 0.42);
              border: 1px solid rgba(255, 255, 255, 0.12);
              color: var(--text-primary);
              box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.2);
            }
            .input-field:hover {
              border-color: rgba(56, 189, 248, 0.28);
              background: rgba(26, 34, 53, 0.52);
            }
            .input-field:focus {
              outline: none;
              border-color: rgba(56, 189, 248, 0.55);
              background: rgba(26, 34, 53, 0.58);
              box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.28);
            }
            /* 备注框：正文与其它输入同为 text-base，占位符略小更协调 */
            .input-field-notes::placeholder {
              font-size: 0.75rem;
              line-height: 1.35;
              color: rgb(148 163 184);
            }
            .input-field-compact { @apply h-9 md:h-10 min-h-0 rounded-lg px-2.5 md:px-3 py-0 text-sm; }
            textarea.input-field {
              @apply h-auto min-h-[5.5rem] py-2;
            }
            .report-card {
              position: relative;
              overflow: hidden;
              background:
                radial-gradient(760px 280px at 12% 0%, rgba(34, 211, 238, 0.13), transparent 62%),
                radial-gradient(720px 320px at 88% 4%, rgba(167, 139, 250, 0.12), transparent 58%),
                linear-gradient(168deg, rgba(15, 23, 42, 0.90) 0%, rgba(15, 23, 42, 0.72) 52%, rgba(2, 6, 23, 0.90) 100%);
              border: 1px solid rgba(148, 163, 184, 0.24);
              box-shadow:
                0 28px 70px -28px rgba(0, 0, 0, 0.78),
                inset 0 1px 0 rgba(255, 255, 255, 0.10);
              color: rgb(226 232 240);
            }
            .report-card::before {
              content: "";
              position: absolute;
              inset: 0;
              pointer-events: none;
              background: linear-gradient(90deg, rgba(34, 211, 238, 0.22), rgba(167, 139, 250, 0.20), rgba(20, 184, 166, 0.16));
              height: 1px;
            }
            .report-section {
              @apply rounded-2xl border p-4 md:p-5;
              background: linear-gradient(168deg, rgba(255, 255, 255, 0.075), rgba(15, 23, 42, 0.34));
              border-color: rgba(148, 163, 184, 0.18);
              scroll-margin-top: 7.5rem;
            }
            .report-section-label {
              @apply mb-2 text-[11px] font-bold uppercase tracking-[0.20em];
              color: rgb(125 211 252);
            }
            .report-callout {
              @apply rounded-2xl border p-4;
              background: linear-gradient(160deg, rgba(16, 185, 129, 0.14), rgba(15, 23, 42, 0.40));
              border-color: rgba(52, 211, 153, 0.24);
            }
            .report-warning {
              @apply rounded-2xl border p-4;
              background: linear-gradient(160deg, rgba(245, 158, 11, 0.14), rgba(15, 23, 42, 0.40));
              border-color: rgba(251, 191, 36, 0.24);
            }
            .report-markdown-block,
            .report-markdown-block .report-markdown {
              color: rgb(203 213 225);
              font-size: 15.5px;
              line-height: 1.82;
            }
            .report-markdown-block .report-markdown h2 {
              @apply mt-7 mb-3 border-b pb-2 text-xl font-black;
              color: rgb(248 250 252);
              border-color: rgba(148, 163, 184, 0.18);
            }
            .report-markdown-block .report-markdown h3 {
              @apply mt-5 mb-2 text-lg font-bold;
              color: rgb(224 242 254);
            }
            .report-markdown-block .report-markdown p { @apply my-2.5; }
            .report-markdown-block .report-markdown ul {
              @apply my-3 space-y-1.5 pl-5;
              color: rgb(203 213 225);
            }
            .report-markdown-block .report-markdown li::marker { color: rgb(34 211 238); }
            .report-markdown-block strong,
            .report-markdown-block .font-semibold {
              color: rgb(248 250 252) !important;
              font-weight: 700;
            }
            .report-markdown-block em { color: rgb(186 230 253) !important; }
            .report-markdown-block a {
              color: rgb(103 232 249) !important;
              text-decoration-color: rgba(103, 232, 249, 0.48);
            }
            .report-markdown-block blockquote,
            .report-markdown blockquote {
              @apply my-4 rounded-r-xl border-l-4 py-3 pl-4 pr-3;
              background: rgba(14, 165, 233, 0.10);
              border-color: rgb(34 211 238);
              color: rgb(226 232 240);
            }
            .report-markdown-block hr { border-color: rgba(148, 163, 184, 0.20) !important; }
            .report-markdown-block table {
              border-color: rgba(148, 163, 184, 0.22) !important;
              background: rgba(15, 23, 42, 0.46);
              color: rgb(226 232 240);
            }
            .report-markdown-block thead { background: rgba(30, 41, 59, 0.86) !important; }
            .report-markdown-block th {
              color: rgb(224 242 254) !important;
              border-color: rgba(148, 163, 184, 0.22) !important;
            }
            .report-markdown-block td {
              color: rgb(203 213 225) !important;
              border-color: rgba(148, 163, 184, 0.14) !important;
            }
            .report-card pre {
              background: rgba(2, 6, 23, 0.42) !important;
              border-color: rgba(148, 163, 184, 0.18) !important;
              color: rgb(226 232 240) !important;
              line-height: 1.72;
            }
            .report-card .text-gray-900,
            .report-card .text-gray-800,
            .report-card .text-gray-700,
            .report-card .text-gray-600 {
              color: rgb(226 232 240) !important;
            }
            .report-card .text-gray-500 { color: rgb(148 163 184) !important; }
            .report-card .text-blue-600 { color: rgb(103 232 249) !important; }
            .report-card .text-green-700,
            .report-card .text-green-800 { color: rgb(110 231 183) !important; }
            .report-card .text-red-700 { color: rgb(253 164 175) !important; }
            .report-card .bg-gray-50,
            .report-card .bg-blue-50,
            .report-card .bg-amber-50,
            .report-card .bg-green-50,
            .report-card .bg-green-50\/80,
            .report-card .bg-red-50\/80,
            .report-card .bg-blue-50\/80 {
              background: rgba(15, 23, 42, 0.42) !important;
            }
            .report-card .border-gray-200,
            .report-card .border-blue-100,
            .report-card .border-amber-100,
            .report-card .border-green-100,
            .report-card .border-green-200,
            .report-card .border-red-100 {
              border-color: rgba(148, 163, 184, 0.18) !important;
            }
            /* 报告内遗留 <details>：隐藏默认三角，与自定义 summary 样式一致 */
            .report-markdown details summary { list-style: none; }
            .report-markdown details summary::-webkit-details-marker { display: none; }
        }
    </style>
